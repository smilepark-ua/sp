<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#FF6C00">
<title>Smile Park — Реєстрація</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --orange:#FF6C00;
  --yellow:#FFD600;
  --green:#4CAF50;
  --red:#e53935;
  --bg:#fff9f4;
  --card:#ffffff;
  --border:#e8ddd4;
  --border2:#f0e8e0;
  --text:#1a1a1a;
  --text2:#666;
  --text3:#aaa;
}
body{
  font-family:'Nunito',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  min-height:100dvh;
}

/* HEADER */
.header{
  background:linear-gradient(135deg,#FF6C00,#FF8F00);
  padding:20px 20px 28px;
  text-align:center;
  position:relative;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  align-items:center;
}
.header::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 80% 20%,rgba(255,214,0,.25),transparent 60%);
}
.logo-img{
  height:44px;
  margin-bottom:12px;position:relative;
}
.event-type-badge{
  display:inline-block;
  background:rgba(255,255,255,.2);
  border-radius:20px;padding:3px 12px;
  font-size:11px;font-weight:800;color:#fff;
  letter-spacing:.06em;margin-bottom:8px;
  position:relative;
}
.event-name{
  font-size:22px;font-weight:900;color:#fff;
  line-height:1.2;margin-bottom:10px;
  position:relative;
}
.event-meta{
  display:flex;gap:12px;justify-content:center;flex-wrap:wrap;
  font-size:12px;font-weight:700;color:rgba(255,255,255,.9);
  position:relative;
}
.event-meta span{display:flex;align-items:center;gap:4px;}

/* PROGRESS */
.progress-wrap{
  background:#fff;border-bottom:1px solid var(--border2);
  padding:12px 20px;
  display:flex;align-items:center;justify-content:center;
  position:sticky;top:0;z-index:10;
}
.steps-inner{
  display:flex;align-items:center;gap:0;
}
.step{display:flex;align-items:center;}
.step-circle{
  width:26px;height:26px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:900;flex-shrink:0;
  border:2px solid var(--border);
  background:#fff;color:var(--text3);
  transition:all .3s;
}
.step-circle.active{border-color:var(--orange);background:var(--orange);color:#fff;}
.step-circle.done{border-color:var(--green);background:var(--green);color:#fff;}
.step-label{
  font-size:12px;font-weight:700;color:var(--text3);
  margin-left:6px;transition:color .3s;white-space:nowrap;
}
.step-label.active{color:var(--orange);}
.step-label.done{color:var(--green);}
.step-line{width:40px;height:2px;background:var(--border);margin:0 8px;flex-shrink:0;transition:background .3s;}
.step-line.done{background:var(--green);}

/* CONTENT */
.content{padding:20px;max-width:480px;margin:0 auto;}

/* CARD */
.card{
  background:var(--card);border-radius:16px;
  border:1px solid var(--border2);
  overflow:hidden;margin-bottom:16px;
  box-shadow:0 2px 12px rgba(0,0,0,.05);
}
.card-hd{
  padding:14px 18px;border-bottom:1px solid var(--border2);
  font-size:12px;font-weight:900;color:var(--text2);
  letter-spacing:.05em;text-transform:uppercase;
  display:flex;align-items:center;gap:8px;
}

/* PARK SELECT */
.park-option{
  display:flex;align-items:center;gap:14px;
  padding:14px 18px;border-bottom:1px solid var(--border2);
  cursor:pointer;transition:background .15s;
}
.park-option:last-child{border-bottom:none;}
.park-option:hover{background:#fff8f5;}
.park-option.selected{background:#fff3e0;}
.park-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.park-name{font-size:15px;font-weight:800;color:var(--text);}
.park-addr{font-size:11px;font-weight:600;color:var(--text3);margin-top:2px;}
.park-radio{
  width:20px;height:20px;border-radius:50%;
  border:2px solid var(--border);background:#fff;
  margin-left:auto;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.park-radio.selected{border-color:var(--orange);background:var(--orange);}
.park-radio.selected::after{content:'';width:8px;height:8px;border-radius:50%;background:#fff;}

/* FORM */
.fld{margin-bottom:14px;}
.fld-lbl{
  display:block;font-size:12px;font-weight:800;
  color:var(--text2);margin-bottom:6px;
}
.req{color:var(--orange);}
.inp{
  width:100%;padding:12px 14px;
  border:1.5px solid var(--border);border-radius:12px;
  font-size:15px;font-family:'Nunito',sans-serif;font-weight:700;
  color:var(--text);background:#fff;outline:none;
  transition:border-color .2s,box-shadow .2s;
  appearance:none;-webkit-appearance:none;
}
.inp:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(255,108,0,.1);}
.inp::placeholder{color:var(--text3);font-weight:500;}
.inp-prefix{
  display:flex;align-items:center;
  border:1.5px solid var(--border);border-radius:12px;
  overflow:hidden;background:#fff;
  transition:border-color .2s,box-shadow .2s;
}
.inp-prefix:focus-within{border-color:var(--orange);box-shadow:0 0 0 3px rgba(255,108,0,.1);}
.prefix{
  padding:12px 12px;font-size:15px;font-weight:800;
  color:var(--orange);background:#fff8f5;
  border-right:1.5px solid var(--border);
  white-space:nowrap;flex-shrink:0;
}
.inp-prefix input{
  flex:1;padding:12px 12px;border:none;
  font-size:15px;font-family:'Nunito',sans-serif;font-weight:700;
  color:var(--text);background:#fff;outline:none;
  min-width:0;
}

/* CHILDREN */
.child-card{
  background:#fff;border:1.5px solid var(--border);
  border-radius:12px;padding:14px;margin-bottom:10px;
  position:relative;
}
.child-card.first{border-color:var(--orange);}
.child-num{
  font-size:11px;font-weight:900;color:var(--orange);
  letter-spacing:.05em;text-transform:uppercase;
  margin-bottom:10px;
}
.age-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.age-btn{
  padding:10px 8px;border-radius:10px;
  border:1.5px solid var(--border);background:#f9f5f2;
  font-size:12px;font-weight:800;cursor:pointer;
  text-align:center;color:var(--text2);
  transition:all .15s;font-family:'Nunito',sans-serif;
}
.age-btn:hover{border-color:var(--orange);color:var(--orange);}
.age-btn.selected{border-color:var(--orange);background:#fff3e0;color:var(--orange);}
.remove-child{
  position:absolute;top:10px;right:12px;
  width:24px;height:24px;border-radius:50%;
  border:none;background:#fee;color:var(--red);
  font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-family:'Nunito',sans-serif;font-weight:900;
}
.add-child-btn{
  width:100%;padding:12px;border-radius:12px;
  border:1.5px dashed var(--border);background:transparent;
  font-size:13px;font-weight:800;color:var(--text3);
  cursor:pointer;font-family:'Nunito',sans-serif;
  transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;
}
.add-child-btn:hover{border-color:var(--orange);color:var(--orange);background:#fff8f5;}

/* CONSENT */
.consent-row{
  display:flex;gap:12px;align-items:flex-start;
  background:#fff3e0;border:1.5px solid #ffcc99;
  border-radius:12px;padding:12px 14px;margin-bottom:16px;
}
.consent-box{
  width:22px;height:22px;border-radius:6px;
  border:1.5px solid var(--border);background:#fff;
  flex-shrink:0;cursor:pointer;margin-top:1px;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;font-size:13px;font-weight:900;
}
.consent-box.checked{
  background:var(--orange);border-color:var(--orange);color:#fff;
}
.consent-text{font-size:12px;font-weight:600;color:#5d4037;line-height:1.6;}

/* SUBMIT */
.submit-btn{
  width:100%;padding:16px;border-radius:14px;border:none;
  background:linear-gradient(135deg,#FF6C00,#FFD600);
  color:#1a0800;font-size:16px;font-weight:900;
  font-family:'Nunito',sans-serif;cursor:pointer;
  box-shadow:0 4px 16px rgba(255,108,0,.35);
  transition:all .15s;opacity:.4;pointer-events:none;
}
.submit-btn.active{opacity:1;pointer-events:auto;}
.submit-btn.active:active{transform:scale(.97);}

/* TICKET */
.ticket-wrap{
  background:var(--card);border-radius:20px;
  border:1px solid var(--border2);overflow:hidden;
  box-shadow:0 4px 24px rgba(0,0,0,.08);
  margin-bottom:16px;
}
.ticket-header{
  background:linear-gradient(135deg,#FF6C00,#FF8F00);
  padding:20px;text-align:center;
}
.ticket-header-title{font-size:12px;font-weight:800;color:rgba(255,255,255,.8);letter-spacing:.08em;margin-bottom:6px;}
.ticket-event{font-size:20px;font-weight:900;color:#fff;margin-bottom:4px;}
.ticket-park{font-size:13px;font-weight:700;color:rgba(255,255,255,.9);}
.ticket-qr{
  padding:24px 20px 16px;
  display:flex;flex-direction:column;align-items:center;gap:10px;
  border-bottom:1px dashed var(--border);
}
.ticket-code{
  font-family:monospace;font-size:20px;font-weight:900;
  color:var(--text);letter-spacing:.15em;
}
.ticket-hint{font-size:11px;font-weight:700;color:var(--text3);}
.ticket-details{padding:16px 20px;}
.ticket-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:7px 0;border-bottom:1px solid var(--border2);
  font-size:13px;
}
.ticket-row:last-child{border-bottom:none;}
.ticket-row-lbl{font-weight:700;color:var(--text2);}
.ticket-row-val{font-weight:900;color:var(--green);}
.ticket-footer{
  background:#fff8f5;border-top:1px solid var(--border2);
  padding:12px 20px;text-align:center;
  font-size:12px;font-weight:800;color:var(--orange);
}

/* SAVE HINT */
.save-hint{
  background:#e8f5e9;border:1.5px solid #a5d6a7;
  border-radius:14px;padding:14px 16px;margin-bottom:12px;
}
.save-hint-title{font-size:14px;font-weight:900;color:#2e7d32;margin-bottom:6px;}
.save-hint-text{font-size:12px;font-weight:600;color:#388e3c;line-height:1.6;}

/* CANCEL BTN */
.cancel-reg-btn{
  width:100%;padding:13px;border-radius:12px;
  border:1.5px solid #ffcdd2;background:#fff;
  color:var(--red);font-size:13px;font-weight:800;
  font-family:'Nunito',sans-serif;cursor:pointer;
  transition:all .15s;
}
.cancel-reg-btn:hover{background:#fff5f5;border-color:var(--red);}

/* CANCEL CONFIRM */
.cancel-confirm{
  background:#fff5f5;border:1.5px solid #ffcdd2;
  border-radius:14px;padding:16px;margin-bottom:12px;
  display:none;
}
.cancel-confirm.show{display:block;}
.cancel-confirm-title{font-size:15px;font-weight:900;color:var(--red);margin-bottom:6px;}
.cancel-confirm-text{font-size:12px;font-weight:600;color:#c62828;margin-bottom:14px;line-height:1.5;}
.cancel-confirm-btns{display:flex;gap:8px;}
.btn-cancel-yes{
  flex:1;padding:11px;border-radius:10px;border:none;
  background:var(--red);color:#fff;
  font-size:13px;font-weight:900;font-family:'Nunito',sans-serif;cursor:pointer;
}
.btn-cancel-no{
  flex:1;padding:11px;border-radius:10px;
  border:1.5px solid var(--border);background:#fff;
  color:var(--text2);font-size:13px;font-weight:800;
  font-family:'Nunito',sans-serif;cursor:pointer;
}

/* LOADER */
.loader{
  display:none;position:fixed;inset:0;
  background:rgba(255,249,244,.85);
  z-index:100;align-items:center;justify-content:center;
  flex-direction:column;gap:12px;
}
.loader.show{display:flex;}
.spinner{
  width:40px;height:40px;border-radius:50%;
  border:3px solid rgba(255,108,0,.2);
  border-top-color:var(--orange);
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{font-size:14px;font-weight:700;color:var(--text2);}

/* TOAST */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:#1a1a1a;border-radius:12px;padding:12px 20px;
  font-size:13px;font-weight:800;color:#fff;
  box-shadow:0 4px 20px rgba(0,0,0,.3);
  display:none;z-index:200;white-space:nowrap;
}
.toast.show{display:block;animation:toastIn .3s ease;}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* EMPTY / ERROR */
.empty-state{
  text-align:center;padding:40px 20px;
}
.empty-icon{font-size:48px;margin-bottom:16px;}
.empty-title{font-size:18px;font-weight:900;color:var(--text);margin-bottom:8px;}
.empty-sub{font-size:13px;font-weight:600;color:var(--text2);line-height:1.6;}

input[type=checkbox],input[type=radio]{appearance:auto;-webkit-appearance:auto;}
</style>
</head>
<body>

<div class="loader" id="loader">
  <div class="spinner"></div>
  <div class="loader-text" id="loader-text">Завантаження...</div>
</div>

<div class="toast" id="toast"></div>

<!-- HEADER -->
<div class="header" id="page-header">
  <img src="https://kyiv.smilepark.ua/img/system/1763616043_40c5c4ce8cd512f420dd.svg"
       alt="Smile Park" class="logo-img"
       onerror="this.style.display='none'">
  <div id="ev-type-badge" style="display:none"></div>
  <div class="event-name" id="ev-name-h">Завантаження...</div>
  <div class="event-meta" id="ev-meta"></div>
</div>

<!-- PROGRESS -->
<div class="progress-wrap" id="progress-wrap" style="display:none">
  <div class="steps-inner">
    <div class="step">
      <div class="step-circle active" id="sc1">1</div>
      <div class="step-label active" id="sl1">Локація</div>
    </div>
    <div class="step-line" id="line1"></div>
    <div class="step">
      <div class="step-circle" id="sc2">2</div>
      <div class="step-label" id="sl2">Дані</div>
    </div>
    <div class="step-line" id="line2"></div>
    <div class="step">
      <div class="step-circle" id="sc3">3</div>
      <div class="step-label" id="sl3">QR-код</div>
    </div>
  </div>
</div>

<!-- CONTENT -->
<div class="content">
  <div id="page-content">
    <div class="empty-state">
      <div class="empty-icon">⏳</div>
      <div class="empty-title">Завантаження...</div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// SUPABASE
// ═══════════════════════════════════════
const SB_URL = 'https://luspigkcemhnksqzlemc.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx1c3BpZ2tjZW1obmtzcXpsZW1jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMzc3NjksImV4cCI6MjA5MjcxMzc2OX0.5QElij7KaTd48i9W2PdDwjBDloIpO5VlpK2QZ1Cs3fw';
const SB_H = {'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,'Content-Type':'application/json'};

async function sbGet(table,q=''){
  const r=await fetch(`${SB_URL}/rest/v1/${table}?${q}`,{headers:SB_H});
  if(!r.ok) return [];
  return r.json();
}
async function sbInsert(table,row){
  const r=await fetch(`${SB_URL}/rest/v1/${table}`,{method:'POST',headers:{...SB_H,'Prefer':'return=minimal'},body:JSON.stringify(row)});
  return r.ok;
}
async function sbPatch(table,id,data){
  const r=await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${encodeURIComponent(id)}`,{method:'PATCH',headers:SB_H,body:JSON.stringify(data)});
  return r.ok;
}
async function sbDelete(table,id){
  const r=await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${encodeURIComponent(id)}`,{method:'DELETE',headers:SB_H});
  return r.ok;
}

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let _groupId = '';
let _events = []; // всі заходи групи
let _selectedEvent = null; // обраний парк/захід
let _children = []; // [{age:'4–6 років'}]
let _adults = 1; // кількість дорослих
let _kidsCount = 1; // кількість дітей
let _kidsAge = ''; // єдина вікова група для всіх дітей
let _consent = false;
let _currentStep = 1; // 1=парк, 2=форма, 3=QR-код

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
async function init(){
  const params = new URLSearchParams(location.search);
  _groupId = params.get('event') || '';

  // Показуємо QR-код якщо є ?ticket=
  const ticketId = params.get('ticket');
  if(ticketId){ await showTicketPage(ticketId); return; }

  if(!_groupId){
    showError('Посилання недійсне','Зверніться до організатора заходу для отримання правильного посилання.');
    return;
  }

  showLoader('Завантаження заходу...');
  try{
    // Завантажуємо всі заходи цієї групи
    _events = await sbGet('events', `group_id=eq.${encodeURIComponent(_groupId)}&order=date.asc`);
    if(!_events.length){
      showError('Захід не знайдено','Можливо, реєстрацію вже закрито або посилання застаріло.');
      return;
    }

    // Оновлюємо хедер
    const ev = _events[0];
    // badge прихований
    document.getElementById('ev-name-h').textContent = ev.name;
    document.getElementById('ev-meta').innerHTML = `
      <span>📅 ${ev.date}${ev.time?' · '+ev.time:''}</span>
      ${ev.age?`<span>👶 ${ev.age}</span>`:''}
      <span>📍 ${_events.length} ${_events.length===1?'локація':_events.length<5?'локації':'локацій'}</span>`;

    hideLoader();
    document.getElementById('progress-wrap').style.display='flex';

    if(_events.length === 1){
      // Один парк — пропускаємо крок вибору
      _selectedEvent = _events[0];
      setStep(2);
      renderForm();
    } else {
      // Кілька парків — показуємо вибір
      setStep(1);
      renderParkSelect();
    }
  } catch(e){
    hideLoader();
    showError('Помилка підключення','Перевірте інтернет та спробуйте ще раз.');
  }
}

// ═══════════════════════════════════════
// STEPS
// ═══════════════════════════════════════
function setStep(n){
  _currentStep = n;
  for(let i=1;i<=3;i++){
    const sc=document.getElementById(`sc${i}`);
    const sl=document.getElementById(`sl${i}`);
    if(i<n){ sc.className='step-circle done'; sc.textContent='✓'; sl.className='step-label done'; }
    else if(i===n){ sc.className='step-circle active'; sc.textContent=i; sl.className='step-label active'; }
    else{ sc.className='step-circle'; sc.textContent=i; sl.className='step-label'; }
  }
  for(let i=1;i<=2;i++){
    document.getElementById(`line${i}`).className='step-line'+(i<n?' done':'');
  }
  // Якщо один парк — ховаємо крок 1
  if(_events.length===1){
    document.getElementById('sc1').parentElement.style.display='none';
    document.getElementById('line1').style.display='none';
  }
}

// ═══════════════════════════════════════
// STEP 1: PARK SELECT
// ═══════════════════════════════════════
function renderParkSelect(){
  const wrap = document.getElementById('page-content');
  wrap.innerHTML = `
    <div class="card">
      <div class="card-hd">📍 Оберіть зручну локацію</div>
      ${_events.map((ev,i)=>`
        <div class="park-option" id="po-${i}" onclick="selectPark(${i})">
          <div class="park-dot" style="background:${ev.park_color||'#ff6c00'}"></div>
          <div>
            <div class="park-name">${ev.park}</div>
            <div class="park-addr">${ev.date}${ev.time?' · '+ev.time:''}</div>
          </div>
          <div class="park-radio" id="pr-${i}"></div>
        </div>`).join('')}
    </div>
    <button class="submit-btn" id="park-next-btn" onclick="confirmPark()" style="opacity:.4;pointer-events:none">
      Далі →
    </button>`;
}

let _selectedParkIdx = -1;
function selectPark(i){
  _selectedParkIdx = i;
  _selectedEvent = _events[i];
  document.querySelectorAll('.park-option').forEach((el,j)=>{
    el.classList.toggle('selected', j===i);
    document.getElementById(`pr-${j}`).className='park-radio'+(j===i?' selected':'');
  });
  const btn=document.getElementById('park-next-btn');

function goBack(){
  setStep(1);
  renderParkSelect();
  // Відновлюємо вибір
  if(_selectedParkIdx>=0) selectPark(_selectedParkIdx);
}

const AGE_GROUPS = ['0–3 роки','4–6 років','7–12 років','12+ років'];

function renderChildren(){
  const list = document.getElementById('children-list');
  if(!list) return;
  list.innerHTML = _children.map((ch,i)=>`
    <div class="child-card${i===0?' first':''}" id="child-${i}">
      ${i>0?`<button class="remove-child" onclick="removeChild(${i})">✕</button>`:''}
      <div class="child-num">${i===0?'Дитина':'Дитина '+(i+1)}</div>
      <div class="age-grid">
        ${AGE_GROUPS.map(ag=>`
          <button class="age-btn${ch.age===ag?' selected':''}"
            onclick="selectAge(${i},'${ag}')">${ag}</button>`).join('')}
      </div>
    </div>`).join('');
}

function selectAge(i, age){
  _children[i].age = age;
  renderChildren();
  checkForm();
}

function addChild(){
  _children.push({age:''});
  renderChildren();
  checkForm();
  // Скролимо до нової дитини
  setTimeout(()=>{
    const el=document.getElementById(`child-${_children.length-1}`);
    if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
  },100);
}

function removeChild(i){
  _children.splice(i,1);
  renderChildren();
  checkForm();
}

// ── ЛІЧИЛЬНИКИ ──
function chAdults(d){
  _adults = Math.max(1, _adults + d);
  const el = document.getElementById('cnt-adults');
  if(el) el.textContent = _adults;
  updateTotal();
  checkForm();
}

function chKids(d){
  _kidsCount = Math.max(0, _kidsCount + d);
  const el = document.getElementById('cnt-kids');
  if(el) el.textContent = _kidsCount;
  // Показуємо/ховаємо вікову групу
  const ageCard = document.getElementById('age-card');
  if(ageCard) ageCard.style.display = _kidsCount > 0 ? 'block' : 'none';
  if(_kidsCount === 0) { _kidsAge = ''; updateAgeButtons(); }
  updateTotal();
  checkForm();
}

function updateTotal(){
  const el = document.getElementById('cnt-total-group');
  if(el) el.textContent = _adults + _kidsCount;
}

function selectKidsAge(age){
  _kidsAge = age;
  updateAgeButtons();
  checkForm();
}

function updateAgeButtons(){
  document.querySelectorAll('#age-grid-main .age-btn').forEach(btn => {
    btn.classList.toggle('selected', btn.dataset.age === _kidsAge);
  });
}

function toggleConsent(){
  _consent = !_consent;
  const box=document.getElementById('consent-box');
  if(box){
    box.className='consent-box'+ (_consent?' checked':'');
    box.textContent=_consent?'✓':'';
  }
  checkForm();
}

function checkForm(){
  const name=(document.getElementById('f-name')?.value||'').trim();
  const phone=(document.getElementById('f-phone')?.value||'').replace(/[^0-9]/g,'');
  const ageOk = _kidsCount === 0 || _kidsAge !== '';
  const valid = name.length>=2 && phone.length>=9 && ageOk && _consent;
  const btn=document.getElementById('submit-btn');
  if(btn){ btn.classList.toggle('active',valid); }
}

// ═══════════════════════════════════════
// SUBMIT
// ═══════════════════════════════════════
async function submitForm(){
  const name=(document.getElementById('f-name')?.value||'').trim();
  const phoneRaw=(document.getElementById('f-phone')?.value||'').replace(/[^0-9]/g,'');
  const phone='+38'+phoneRaw;

  if(!name||phoneRaw.length<9){toast('⚠️ Заповніть всі обов\'язкові поля');return;}
  if(_kidsCount > 0 && !_kidsAge){toast('⚠️ Оберіть вікову групу дітей');return;}
  if(!_consent){toast('⚠️ Підтвердіть згоду');return;}
  if(!_selectedEvent){toast('⚠️ Оберіть локацію');return;}

  showLoader('Реєстрація...');

  const regId = 'SP-'+Math.floor(1000+Math.random()*9000);
  const ageGroups = _kidsCount > 0 ? [_kidsAge] : [];
  const reg = {
    id: regId,
    event_id: _selectedEvent.id,
    event_name: _selectedEvent.name,
    park: _selectedEvent.park,
    name, phone,
    adults: _adults,
    children: _kidsCount,
    total_count: _adults + _kidsCount,
    age_groups: ageGroups,
    kids_girls: 0, kids_boys: _kidsCount,
    adult_women: 0, adult_men: _adults,
    bday_kids: 0,
    checked_in: false,
    actual_adults:0, actual_girls:0, actual_boys:0, actual_total:0,
    created_at: Date.now()
  };

  const ok = await sbInsert('registrations', reg);
  hideLoader();

  if(!ok){
    toast('❌ Помилка збереження. Спробуйте ще раз.');
    return;
  }

  // Відправляємо SMS через Make webhook
  const ticketUrl = `https://smilepark-ua.github.io/smilepark/smilepark_reg.html?ticket=${reg.id}`;
  try{
    fetch('https://smilepark-sms.familypark-kh.workers.dev', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        phone: reg.phone.replace(/^\+/, ''),
        regId: reg.id,
        eventName: reg.event_name,
        date: _selectedEvent.date + (_selectedEvent.time ? ' ' + _selectedEvent.time : ''),
        park: reg.park,
        ticketUrl: ticketUrl
      })
    });
  } catch(e){ console.warn('SMS error:', e); }

  setStep(3);
  renderTicket(reg);
}

      <div class="empty-state">

  hideLoader();
}

function showLoader(txt='Завантаження...'){
  document.getElementById('loader-text').textContent=txt;
  document.getElementById('loader').classList.add('show');
}
function hideLoader(){
  document.getElementById('loader').classList.remove('show');
}

let _toastT;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(_toastT);
  _toastT=setTimeout(()=>el.classList.remove('show'),3000);
}

// ═══════════════════════════════════════
// START
// ═══════════════════════════════════════
init();
</script>
