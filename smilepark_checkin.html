<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#8431F5">
<title>Smile Park — Check-in</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --orange:#8431F5;
  --yellow:#9B4FFF;
  --green:#4CAF50;
  --red:#f25252;
  --bg:#f5f6fa;
  --bg2:#ffffff;
  --surface:#f5f6fa;
  --surface2:#eef0f7;
  --border:rgba(0,0,0,0.10);
  --text:#1a1a2e;
  --text2:#5a5f7a;
  --text3:#9096b0;
}
body{
  font-family:'Nunito',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  min-height:100dvh;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.header{
  background:#ffffff;
  border-bottom:1px solid rgba(0,0,0,0.08);
  padding:12px 16px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.logo{
  font-size:16px;font-weight:900;
  background:linear-gradient(90deg,var(--yellow),var(--orange));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.header-sub{font-size:11px;font-weight:700;color:var(--text3);}
.live{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--text2);}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:16px;}

/* EVENT SELECT */
.ev-select-wrap{margin-bottom:16px;}
.ev-label{font-size:11px;font-weight:800;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
select{
  width:100%;padding:12px 14px;
  border:1px solid var(--border);border-radius:12px;
  background:var(--surface);color:var(--text);
  font-size:14px;font-family:'Nunito',sans-serif;font-weight:700;
  outline:none;appearance:none;-webkit-appearance:none;
}

/* SCAN AREA */
.scan-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:16px;overflow:hidden;margin-bottom:16px;
}
.scan-tabs{display:flex;border-bottom:1px solid rgba(0,0,0,0.08);}
.stab{
  flex:1;padding:12px;text-align:center;
  font-size:13px;font-weight:800;color:var(--text3);
  cursor:pointer;border-bottom:2px solid transparent;
  transition:all .2s;
}
.stab.active{color:var(--orange);border-bottom-color:var(--orange);}

/* QR SCANNER */
.qr-wrap{padding:16px;}
#qr-reader{
  width:100%;max-width:320px;height:320px;
  margin:0 auto;border-radius:16px;overflow:hidden;background:#000;
  position:relative;display:none;
}
#qr-reader.active{display:block;}
#qr-reader video{
  width:100%!important;height:100%!important;
  object-fit:cover;border-radius:16px;
}
#qr-reader img{border-radius:16px;}
#qr-reader canvas{display:none;}
.qr-hint{text-align:center;font-size:12px;font-weight:700;color:var(--text3);margin-top:10px;}

/* MANUAL INPUT */
.manual-wrap{padding:16px;}
.code-input-row{display:flex;gap:8px;}
.code-input{
  flex:1;padding:14px;
  border:2px solid var(--border);border-radius:12px;
  background:var(--surface);color:var(--text);
  font-size:20px;font-family:'Nunito',sans-serif;font-weight:900;
  letter-spacing:.12em;text-align:center;text-transform:uppercase;
  outline:none;
  transition:border-color .2s;
}
.code-input:focus{border-color:var(--orange);}
.find-btn{
  padding:14px 20px;border-radius:12px;
  background:linear-gradient(135deg,var(--orange),var(--yellow));
  color:#ffffff;font-size:14px;font-weight:900;
  font-family:'Nunito',sans-serif;border:none;cursor:pointer;
  white-space:nowrap;
}

/* RESULT CARD */
.result-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:16px;margin-bottom:16px;overflow:hidden;
  animation:slideIn .3s ease;
}
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.result-header{
  padding:16px;
  border-bottom:1px solid rgba(0,0,0,0.08);
  display:flex;align-items:center;justify-content:space-between;
}
.result-name{font-size:20px;font-weight:900;color:var(--text);}
.result-event{font-size:12px;font-weight:700;color:var(--orange);margin-top:2px;}
.badge{
  padding:4px 10px;border-radius:20px;
  font-size:11px;font-weight:800;
  background:rgba(91,156,246,.15);color:#5b9cf6;
}
.badge.checked{background:rgba(242,82,82,.15);color:var(--red);}

.result-info{padding:14px 16px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:1px solid rgba(0,0,0,0.08);}
.info-chip{
  background:var(--surface);border-radius:8px;
  padding:6px 12px;font-size:12px;font-weight:700;color:var(--text2);
}
.info-chip strong{color:var(--text);}

/* BDAY ALERT */
.bday-alert{
  margin:0 16px 0;padding:10px 14px;
  background:rgba(132,49,245,.1);border:1px solid rgba(132,49,245,.3);
  border-radius:10px;font-size:13px;font-weight:800;color:var(--yellow);
  display:flex;align-items:center;gap:8px;
}

/* COUNTERS */
.counters-wrap{padding:16px;}
.counters-title{
  font-size:10px;font-weight:900;color:var(--text3);
  letter-spacing:.07em;text-transform:uppercase;margin-bottom:12px;
}
.counter-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.08);
}
.counter-row:last-child{border-bottom:none;}
.counter-label{font-size:15px;font-weight:800;}
.counter-ctrl{display:flex;align-items:center;gap:12px;}
.cnt-btn{
  width:36px;height:36px;border-radius:50%;
  border:1.5px solid var(--border);
  background:var(--surface2);
  font-size:20px;font-weight:900;color:var(--text);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s;
  -webkit-user-select:none;user-select:none;
}
.cnt-btn:active{border-color:var(--orange);color:var(--orange);transform:scale(.9);}
.cnt-num{font-size:22px;font-weight:900;min-width:32px;text-align:center;}

.total-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;border-top:1px solid var(--border);
}
.total-label{font-size:14px;font-weight:800;color:var(--text2);}
.total-num{font-size:26px;font-weight:900;color:var(--text);}

.confirm-btn{
  width:calc(100% - 32px);margin:0 16px 16px;
  padding:16px;border-radius:14px;border:none;
  background:linear-gradient(135deg,var(--green),#43a047);
  color:#fff;font-size:16px;font-weight:900;
  font-family:'Nunito',sans-serif;cursor:pointer;
  box-shadow:0 4px 16px rgba(76,175,80,.3);
  transition:all .15s;
}
.confirm-btn:active{transform:scale(.97);}

/* SUCCESS */
.success-card{
  background:rgba(76,175,80,.1);
  border:1px solid rgba(76,175,80,.3);
  border-radius:16px;padding:24px;
  text-align:center;margin-bottom:16px;
  animation:slideIn .3s ease;
}
.success-icon{font-size:48px;margin-bottom:12px;}
.success-title{font-size:22px;font-weight:900;color:var(--green);margin-bottom:4px;}
.success-sub{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:16px;}
.next-btn{
  padding:13px 28px;border-radius:12px;border:none;
  background:var(--surface2);color:var(--text);
  font-size:14px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;
}

/* STATS */
.stats-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:16px;padding:16px;margin-bottom:16px;
}
.stats-title{
  font-size:10px;font-weight:900;color:var(--text3);
  letter-spacing:.07em;text-transform:uppercase;margin-bottom:12px;
}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.stat-box{
  background:var(--surface);border-radius:10px;padding:12px;text-align:center;
}
.stat-box-val{font-size:24px;font-weight:900;}
.stat-box-lbl{font-size:10px;font-weight:800;color:var(--text3);margin-top:2px;}
.prog-wrap{margin-top:12px;}
.prog-bar{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-top:6px;}
.prog-fill{height:100%;border-radius:3px;background:var(--green);transition:width .4s;}

/* TOAST */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--bg2);border:1px solid var(--border);
  border-radius:14px;padding:12px 20px;
  font-size:14px;font-weight:800;color:var(--text);
  box-shadow:0 8px 32px rgba(0,0,0,.5);
  display:none;z-index:999;white-space:nowrap;
  animation:toastIn .3s ease;
}
.toast.show{display:block;}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

input[type=checkbox],input[type=radio]{appearance:auto;-webkit-appearance:auto;}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- HEADER -->
<div class="header">
  <div>
    <img src="https://kyiv.smilepark.ua/img/system/1763616043_40c5c4ce8cd512f420dd.svg" alt="Smile Park" style="height:28px">
    <div class="header-sub">Система Check-in</div>
  </div>
  <div class="live"><div class="ldot"></div>Онлайн</div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- Вибір заходу -->
  <div class="ev-select-wrap">
    <div class="ev-label">Захід</div>
    <select id="ev-sel" onchange="onEventChange()">
      <option value="">⏳ Завантаження...</option>
    </select>
  </div>

  <!-- Статистика заходу -->
  <div class="stats-card" id="stats-card" style="display:none">
    <div class="stats-title">Статистика заходу</div>
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-box-val" id="st-reg" style="color:var(--orange)">0</div>
        <div class="stat-box-lbl">Зареєстровано</div>
      </div>
      <div class="stat-box">
        <div class="stat-box-val" id="st-act" style="color:var(--green)">0</div>
        <div class="stat-box-lbl">Відвідали</div>
      </div>
    </div>
    <div class="prog-wrap">
      <div style="display:flex;justify-content:space-between;font-size:11px;font-weight:700;color:var(--text3)">
        <span>Явка</span><span id="st-pct">0%</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="st-bar" style="width:0%"></div></div>
    </div>
  </div>

  <!-- Скан / Ввід -->
  <div class="scan-card" id="scan-card">
    <div class="scan-tabs">
      <div class="stab active" id="tab-qr" onclick="switchTab('qr')">📷 Сканувати QR</div>
      <div class="stab" id="tab-manual" onclick="switchTab('manual')">⌨️ Ввести код</div>
    </div>

    <!-- QR -->
    <div class="qr-wrap" id="panel-qr">
      <div id="qr-reader"></div>
      <div id="qr-start-btn" style="text-align:center;padding:20px 0">
        <button onclick="startQR()" style="padding:14px 28px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--orange),var(--yellow));color:#ffffff;font-size:15px;font-weight:900;font-family:'Nunito',sans-serif;cursor:pointer;width:100%">
          📷 Увімкнути камеру
        </button>
      </div>
      <div class="qr-hint" id="qr-hint" style="display:none">Наведіть камеру на QR-код квитка</div>
      <div style="text-align:center;margin-top:12px">
        <button onclick="switchTab('manual')" style="padding:8px 18px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:12px;font-weight:700;font-family:'Nunito',sans-serif;cursor:pointer">
          Ввести код вручну
        </button>
      </div>
    </div>

    <!-- Manual -->
    <div class="manual-wrap" id="panel-manual" style="display:none">
      <div class="code-input-row">
        <input class="code-input" id="code-input" placeholder="SP-XXXX"
          maxlength="7" autocomplete="off" autocorrect="off"
          onkeydown="if(event.key==='Enter')findReg()"
          oninput="this.value=this.value.toUpperCase()">
        <button class="find-btn" onclick="findReg()">Знайти</button>
      </div>
    </div>
  </div>

  <!-- Результат -->
  <div id="result-wrap" style="display:none"></div>

  <!-- Успіх -->
  <div id="success-wrap" style="display:none"></div>

</div>

<script>
// ═══════════════════════════════════════
// SUPABASE
// ═══════════════════════════════════════
const SB_URL = 'https://luspigkcemhnksqzlemc.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx1c3BpZ2tjZW1obmtzcXpsZW1jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMzc3NjksImV4cCI6MjA5MjcxMzc2OX0.5QElij7KaTd48i9W2PdDwjBDloIpO5VlpK2QZ1Cs3fw';

const sbHeaders = {
  'apikey': SB_KEY,
  'Authorization': `Bearer ${SB_KEY}`,
  'Content-Type': 'application/json'
};

async function sbGet(table, query=''){
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${query}`, {headers: sbHeaders});
  if(!r.ok) return [];
  return r.json();
}

async function sbPatch(table, id, data){
  const r = await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${encodeURIComponent(id)}`, {
    method:'PATCH', headers: sbHeaders, body: JSON.stringify(data)
  });
  return r.ok;
}

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let _events = [];
let _currentEventId = '';
let _currentReg = null;
let _cntA = 0, _cntG = 0, _cntB = 0, _cntK = 0;
let _collectGender = true;
let _qrScanner = null;
let _scanning = false;

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
async function init(){
  try{
    _events = await sbGet('events', 'order=date.asc');
    fillEventSelect();
  } catch(e){
    toast('❌ Немає зв\'язку з базою');
  }
}

function fillEventSelect(){
  const sel = document.getElementById('ev-sel');

  // Групуємо заходи по group_id
  const groups = {};
  _events.forEach(ev => {
    const key = ev.group_id || ev.id;
    if(!groups[key]) groups[key] = {name: ev.name, date: ev.date, time: ev.time, entries: []};
    groups[key].entries.push(ev);
  });

  sel.innerHTML = '<option value="">— Оберіть захід —</option>';
  Object.entries(groups).forEach(([gid, g]) => {
    const label = `${g.name} · ${g.date}${g.time ? ' ' + g.time : ''}`;
    // Для кожного парку окремий option
    g.entries.forEach(ev => {
      sel.innerHTML += `<option value="${ev.id}">${label} · ${ev.park}</option>`;
    });
  });
}

async function onEventChange(){
  _currentEventId = document.getElementById('ev-sel').value;
  document.getElementById('result-wrap').style.display = 'none';
  document.getElementById('success-wrap').style.display = 'none';
  resetScan();
  if(_currentEventId) await updateStats();
  document.getElementById('stats-card').style.display = _currentEventId ? 'block' : 'none';
}

async function updateStats(){
  if(!_currentEventId) return;
  const regs = await sbGet('registrations', `event_id=eq.${_currentEventId}`);
  const totalReg = regs.reduce((s,r) => s + (r.total_count||0), 0);
  const checkedRegs = regs.filter(r => r.checked_in);
  const totalAct = checkedRegs.reduce((s,r) => s + (r.actual_total||0), 0);
  const pct = totalReg > 0 ? Math.round(totalAct / totalReg * 100) : 0;

  document.getElementById('st-reg').textContent = totalReg;
  document.getElementById('st-act').textContent = totalAct;
  document.getElementById('st-pct').textContent = pct + '%';
  document.getElementById('st-bar').style.width = pct + '%';
}

// ═══════════════════════════════════════
// TABS
// ═══════════════════════════════════════
function switchTab(tab){
  document.getElementById('tab-qr').classList.toggle('active', tab==='qr');
  document.getElementById('tab-manual').classList.toggle('active', tab==='manual');
  document.getElementById('panel-qr').style.display = tab==='qr' ? 'block' : 'none';
  document.getElementById('panel-manual').style.display = tab==='manual' ? 'block' : 'none';

  if(tab === 'qr'){
    // Камера запускається вручну через кнопку
  } else {
    stopQR();
    setTimeout(() => document.getElementById('code-input').focus(), 100);
  }
}

// ═══════════════════════════════════════
// QR SCANNER
// ═══════════════════════════════════════
async function startQR(){
  if(_scanning) return;
  const startBtn = document.getElementById('qr-start-btn');
  const hint = document.getElementById('qr-hint');
  const readerEl = document.getElementById('qr-reader');

  // Очищаємо і готуємо контейнер
  readerEl.innerHTML = '';
  readerEl.classList.add('active');

  if(startBtn) startBtn.style.display = 'none';
  if(hint) hint.style.display = 'block';

  try{
    _qrScanner = new Html5Qrcode('qr-reader', {verbose: false});
    await _qrScanner.start(
      {facingMode: 'environment'},
      {
        fps: 15,
        qrbox: {width: 220, height: 220},
        aspectRatio: 1.0,
        disableFlip: false,
      },
      (decodedText) => {
        const match = decodedText.match(/SP-\d+/);
        const ticketCode = match ? match[0] : decodedText.trim().toUpperCase();
        if(ticketCode.startsWith('SP-')){
          stopQR();
          if(startBtn) startBtn.style.display = 'block';
          if(hint) hint.style.display = 'none';
          processCode(ticketCode);
        }
      },
      (err) => { /* ігноруємо помилки сканування */ }
    );
    _scanning = true;
  } catch(e){
    console.warn('QR error:', e);
    readerEl.innerHTML = '';
    if(startBtn) startBtn.style.display = 'block';
    if(hint) hint.style.display = 'none';
    switchTab('manual');
    toast('📷 Камера недоступна — введіть код вручну');
  }
}

async function stopQR(){
  if(_qrScanner && _scanning){
    try{ await _qrScanner.stop(); _qrScanner.clear(); } catch(e){}
    _scanning = false;
    _qrScanner = null;
    const readerEl = document.getElementById('qr-reader');
    if(readerEl){ readerEl.innerHTML = ''; readerEl.classList.remove('active'); }
  }
}
// ═══════════════════════════════════════
// FIND REG
// ═══════════════════════════════════════
async function findReg(){
  const code = document.getElementById('code-input').value.trim().toUpperCase();
  if(!code){ toast('⚠️ Введіть код'); return; }
  await processCode(code);
}

async function processCode(code){
  if(!_currentEventId){ toast('⚠️ Оберіть захід'); return; }

  let reg = null;
  try{
    const data = await sbGet('registrations', `id=eq.${encodeURIComponent(code)}`);
    reg = data[0] || null;
  } catch(e){ toast('❌ Помилка зв\'язку'); return; }

  if(!reg){ toast(`❌ Код ${code} не знайдено`); return; }

  // Перевіряємо чи реєстрація належить до обраного заходу (парку)
  if(reg.event_id !== _currentEventId){
    const regPark = reg.park || '';
    const regEvName = reg.event_name || '';
    showWrongEvent(reg, regEvName, regPark);
    return;
  }

  if(reg.checked_in){
    toast('⚠️ Цю групу вже відмічено');
    showAlreadyChecked(reg);
    return;
  }

  _currentReg = reg;

  // Визначаємо чи захід збирає стать
  const ev = _events.find(e => e.id === reg.event_id);
  _collectGender = ev ? !!(ev.collect && ev.collect.gender) : false;

  // Початкові значення лічильників
  _cntA = reg.adults || 0;
  _cntG = reg.kids_girls || 0;
  _cntB = reg.kids_boys || 0;
  _cntK = reg.children || 0;

  showResult(reg);
}

// ═══════════════════════════════════════
// SHOW RESULT
// ═══════════════════════════════════════
function showResult(reg){
  const adults = reg.adults || 0;
  const children = reg.children || 0;
  const total = reg.total_count || 0;
  const kidsGirls = reg.kids_girls || 0;
  const kidsBoys = reg.kids_boys || 0;
  const adultWomen = reg.adult_women || 0;
  const adultMen = reg.adult_men || adults;
  const bdayKids = reg.bday_kids || 0;
  const eventName = reg.event_name || '';

  const countersHTML = _collectGender ? `
    <div class="counter-row">
      <div class="counter-label">🧑 Дорослих</div>
      <div class="counter-ctrl">
        <div class="cnt-btn" onclick="chCnt('a',-1)">−</div>
        <div class="cnt-num" id="cn-a">${_cntA}</div>
        <div class="cnt-btn" onclick="chCnt('a',1)">+</div>
      </div>
    </div>
    <div class="counter-row">
      <div class="counter-label">👧 Дівчаток</div>
      <div class="counter-ctrl">
        <div class="cnt-btn" onclick="chCnt('g',-1)">−</div>
        <div class="cnt-num" id="cn-g">${_cntG}</div>
        <div class="cnt-btn" onclick="chCnt('g',1)">+</div>
      </div>
    </div>
    <div class="counter-row">
      <div class="counter-label">👦 Хлопчиків</div>
      <div class="counter-ctrl">
        <div class="cnt-btn" onclick="chCnt('b',-1)">−</div>
        <div class="cnt-num" id="cn-b">${_cntB}</div>
        <div class="cnt-btn" onclick="chCnt('b',1)">+</div>
      </div>
    </div>` : `
    <div class="counter-row">
      <div class="counter-label">🧑 Дорослих</div>
      <div class="counter-ctrl">
        <div class="cnt-btn" onclick="chCnt('a',-1)">−</div>
        <div class="cnt-num" id="cn-a">${_cntA}</div>
        <div class="cnt-btn" onclick="chCnt('a',1)">+</div>
      </div>
    </div>
    <div class="counter-row">
      <div class="counter-label">👶 Дітей</div>
      <div class="counter-ctrl">
        <div class="cnt-btn" onclick="chCnt('k',-1)">−</div>
        <div class="cnt-num" id="cn-k">${_cntK}</div>
        <div class="cnt-btn" onclick="chCnt('k',1)">+</div>
      </div>
    </div>`;

  const bdayHTML = bdayKids > 0 ? `
    <div class="bday-alert">
      🎂 Іменинник! Вхід безкоштовний — перевір свідоцтво про народження
    </div>` : '';

  // Фільтри (розмір роликів, футболки, харчові уподобання тощо)
  const fd = reg.filters_data;
  let filtersHTML = '';
  if(fd){
    const adultsCount = reg.adults || 0;
    const kidsCount = reg.children || 0;
    const labels = [];
    for(let i=0;i<adultsCount;i++) labels.push(`Дорослий${adultsCount>1?' '+(i+1):''}`);
    for(let i=0;i<kidsCount;i++) labels.push(`Дитина${kidsCount>1?' '+(i+1):''}`);

    let blocks = '';
    if(fd.skates && fd.skates.some(v=>v)){
      blocks += `<div style="margin-bottom:10px">
        <div style="font-size:12px;font-weight:900;color:#5a5f7a;margin-bottom:4px">🛼 Розмір роликів</div>
        ${fd.skates.map((v,i)=>v?`<div style="font-size:13px;font-weight:700;color:#1a1a2e">${labels[i]||''}: <span style="color:#8431F5">${v}</span></div>`:'').join('')}
      </div>`;
    }
    if(fd.tshirt && fd.tshirt.some(v=>v)){
      blocks += `<div style="margin-bottom:10px">
        <div style="font-size:12px;font-weight:900;color:#5a5f7a;margin-bottom:4px">👕 Розмір футболки</div>
        ${fd.tshirt.map((v,i)=>v?`<div style="font-size:13px;font-weight:700;color:#1a1a2e">${labels[i]||''}: <span style="color:#8431F5">${v}</span></div>`:'').join('')}
      </div>`;
    }
    if(fd.food){
      blocks += `<div style="margin-bottom:10px">
        <div style="font-size:12px;font-weight:900;color:#5a5f7a;margin-bottom:4px">🍕 Харчові уподобання</div>
        <div style="font-size:13px;font-weight:700;color:#1a1a2e">${fd.food}</div>
      </div>`;
    }
    if(fd.custom && Object.keys(fd.custom).length){
      Object.entries(fd.custom).forEach(([label,val])=>{
        if(Array.isArray(val)){
          if(val.some(v=>v)) blocks += `<div style="margin-bottom:10px">
            <div style="font-size:12px;font-weight:900;color:#5a5f7a;margin-bottom:4px">📋 ${label}</div>
            ${val.map((v,i)=>v?`<div style="font-size:13px;font-weight:700;color:#1a1a2e">${labels[i]||''}: <span style="color:#8431F5">${v}</span></div>`:'').join('')}
          </div>`;
        } else if(val){
          blocks += `<div style="margin-bottom:10px">
            <div style="font-size:12px;font-weight:900;color:#5a5f7a;margin-bottom:4px">📋 ${label}</div>
            <div style="font-size:13px;font-weight:700;color:#1a1a2e">${val}</div>
          </div>`;
        }
      });
    }
    if(blocks){
      filtersHTML = `<div style="background:#f0ebff;border:1px solid #d4c0fa;border-radius:12px;padding:14px 16px;margin-bottom:14px">
        <div style="font-size:11px;font-weight:900;color:#8431F5;letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px">ℹ️ Додаткова інформація</div>
        ${blocks}
      </div>`;
    }
  }

  document.getElementById('result-wrap').style.display = 'block';
  document.getElementById('success-wrap').style.display = 'none';
  document.getElementById('result-wrap').innerHTML = `
    <div class="result-card">
      <div class="result-header">
        <div>
          <div class="result-name">${reg.name}</div>
          <div class="result-event">${eventName} · ${reg.park}</div>
        </div>
        <div class="badge">Знайдено</div>
      </div>

      <div class="result-info">
        <div class="info-chip">👥 Разом: <strong>${total}</strong></div>
        <div class="info-chip">🧑 Дор.: <strong>${adults}</strong>${_collectGender ? ` (♀${adultWomen} ♂${adultMen})` : ''}</div>
        <div class="info-chip">👶 Дітей: <strong>${children}</strong>${_collectGender ? ` (♀${kidsGirls} ♂${kidsBoys})` : ''}</div>
      </div>

      ${bdayHTML}

      ${filtersHTML}

      <div class="counters-wrap">
        <div class="counters-title">Фактично прийшло:</div>
        ${countersHTML}
      </div>

      <div class="total-row">
        <div class="total-label">Разом:</div>
        <div class="total-num" id="cn-total">${calcTotal()}</div>
      </div>

      <button class="confirm-btn" onclick="confirmCI()">✓ Підтвердити Check-in</button>
    </div>`;

  // Скролимо до результату
  document.getElementById('result-wrap').scrollIntoView({behavior:'smooth', block:'start'});
}

function showWrongEvent(reg, evName, park){
  document.getElementById('result-wrap').style.display = 'block';
  document.getElementById('result-wrap').innerHTML = `
    <div class="result-card">
      <div class="result-header">
        <div>
          <div class="result-name">${reg.name}</div>
          <div class="result-event" style="color:var(--red)">${evName} · ${park}</div>
        </div>
        <div class="badge" style="background:rgba(242,82,82,.15);color:var(--red)">Інший парк</div>
      </div>
      <div style="padding:16px;background:rgba(242,82,82,.08);border-top:1px solid rgba(242,82,82,.2)">
        <div style="font-size:14px;font-weight:800;color:var(--red);margin-bottom:6px">❌ Реєстрація на інший парк!</div>
        <div style="font-size:13px;font-weight:700;color:var(--text2)">Ця реєстрація дійсна для <strong style="color:var(--text)">${park}</strong>, а не для обраного вами заходу.</div>
      </div>
    </div>`;
  document.getElementById('result-wrap').scrollIntoView({behavior:'smooth'});
}

function showAlreadyChecked(reg){
  document.getElementById('result-wrap').style.display = 'block';
  document.getElementById('result-wrap').innerHTML = `
    <div class="result-card">
      <div class="result-header">
        <div>
          <div class="result-name">${reg.name}</div>
          <div class="result-event">${reg.event_name || ''} · ${reg.park}</div>
        </div>
        <div class="badge checked">Вже відмічено</div>
      </div>
      <div style="padding:16px;font-size:13px;font-weight:700;color:var(--text2)">
        Цю групу вже відмічено. Фактично прийшло: <strong style="color:var(--text)">${reg.actual_total || 0} осіб</strong>
      </div>
    </div>`;
  document.getElementById('result-wrap').scrollIntoView({behavior:'smooth'});
}

// ═══════════════════════════════════════
// COUNTERS
// ═══════════════════════════════════════
function chCnt(t, d){
  if(t==='a') _cntA = Math.max(0, _cntA + d);
  if(t==='g') _cntG = Math.max(0, _cntG + d);
  if(t==='b') _cntB = Math.max(0, _cntB + d);
  if(t==='k') _cntK = Math.max(0, _cntK + d);

  const ea = document.getElementById('cn-a');
  const eg = document.getElementById('cn-g');
  const eb = document.getElementById('cn-b');
  const ek = document.getElementById('cn-k');
  const et = document.getElementById('cn-total');

  if(ea) ea.textContent = _cntA;
  if(eg) eg.textContent = _cntG;
  if(eb) eb.textContent = _cntB;
  if(ek) ek.textContent = _cntK;
  if(et) et.textContent = calcTotal();
}

function calcTotal(){
  return _collectGender ? _cntA + _cntG + _cntB : _cntA + _cntK;
}

// ═══════════════════════════════════════
// CONFIRM CHECK-IN
// ═══════════════════════════════════════
async function confirmCI(){
  if(!_currentReg) return;
  const total = calcTotal();
  const now = Date.now();

  const btn = document.querySelector('.confirm-btn');
  if(btn){ btn.textContent = '⏳ Зберігаємо...'; btn.disabled = true; }

  const ok = await sbPatch('registrations', _currentReg.id, {
    checked_in: true,
    checked_in_at: now,
    actual_adults: _cntA,
    actual_girls: _collectGender ? _cntG : 0,
    actual_boys: _collectGender ? _cntB : 0,
    actual_total: total
  });

  if(!ok){
    toast('❌ Помилка збереження');
    if(btn){ btn.textContent = '✓ Підтвердити Check-in'; btn.disabled = false; }
    return;
  }

  // Показуємо успіх
  document.getElementById('result-wrap').style.display = 'none';
  document.getElementById('success-wrap').style.display = 'block';
  document.getElementById('success-wrap').innerHTML = `
    <div class="success-card">
      <div class="success-icon">✅</div>
      <div class="success-title">Check-in підтверджено!</div>
      <div class="success-sub">${_currentReg.name} · ${total} осіб (${_cntA} дор. + ${_collectGender ? _cntG+_cntB : _cntK} дітей)</div>
      <button class="next-btn" onclick="resetScan()">← Наступна група</button>
    </div>`;

  document.getElementById('success-wrap').scrollIntoView({behavior:'smooth'});
  await updateStats();
}

// ═══════════════════════════════════════
// RESET
// ═══════════════════════════════════════
function resetScan(){
  _currentReg = null;
  document.getElementById('result-wrap').style.display = 'none';
  document.getElementById('success-wrap').style.display = 'none';
  document.getElementById('code-input').value = '';

  // Перезапускаємо QR якщо активний
  const activeTab = document.getElementById('tab-qr').classList.contains('active') ? 'qr' : 'manual';
  if(activeTab === 'qr'){
    stopQR().then(() => startQR());
  }

  window.scrollTo({top:0, behavior:'smooth'});
}

// ═══════════════════════════════════════
// TOAST
// ═══════════════════════════════════════
let _toastTimer;
function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ═══════════════════════════════════════
// START
// ═══════════════════════════════════════
init();
</script>
</body>
</html>
